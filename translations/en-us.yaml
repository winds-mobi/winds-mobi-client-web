settings:
  title: Settings
  intro: >-
    Personalise how winds.mobi looks and behaves. These preferences are stored
    in this browser only and take effect right away.
  faviconFollowsStation:
    label: Selected station in the browser tab
    description: >-
      Replace the browser-tab icon with the open station's wind arrow, so its
      latest reading is visible at a glance from another tab.
  showGustsOutline:
    label: Highlight gusts in the arrow centre
    description: >-
      When a station's gusts reach a higher wind-speed colour band than its
      average wind, fill the arrow's centre circle with the gust's colour, so the
      marker shows both readings at once. Turn off to keep every arrow a single
      colour.
  shrinkOldData:
    label: Make old data's arrows smaller
    description: >-
      Shrink each wind arrow the older its last reading is, so fresh stations
      stand out and stale ones recede. Arrows scale linearly from full size
      now down to half size at 30 minutes, and never shrink below half size.
  nearbyCompactList:
    label: Compact nearby cards
    description: >-
      Show nearby stations as compact cards (name, altitude, wind, gusts, last
      update, and a small wind-direction thumbnail) instead of full-size
      cards, so more stations fit on screen without scrolling.
  favoritesCompactList:
    label: Compact favourite cards
    description: >-
      Show favourite stations as compact cards (name, altitude, wind, gusts,
      last update, and a small wind-direction thumbnail) instead of full-size
      cards, so more stations fit on screen without scrolling.
  useIconLabels:
    label: Use icons for labels
    description: >-
      Show a small icon instead of the text label for each value in the Now
      and Last hour cards. Each value then only takes as much width as it
      needs, so several fit per row instead of one per row.
  betaFeaturesEnabled:
    label: Enable beta features
    description: >-
      Turn on early access to features still in development.
    warning: >-
      Beta features are early access. We do not guarantee they work correctly.

help:
  title: Help
  intro: Winds.mobi shows live wind and weather stations on a map, so you can check conditions and plan your flight.
  sections:
    mapDescription: Browse stations on the map and open one for full detail.
    nearbyDescription: Use your location to compare the closest stations side by side.
    favoritesDescription: Save stations for quick access — stored in your browser, no account needed.
    settingsDescription: Turn display preferences on or off, like gusts outline or compact cards.
  liveExample:
    title: Live station example
    description: A live Holfuy 1804 station, so you can see the real widgets in action.
    legendTitle: What you are looking at
    items:
      headerTitle: Station header
      headerDescription: Name, altitude, last update, provider, and distance (when your location is available). A mountain icon marks a take-off site.
      nowTitle: Now
      nowDescription: Latest wind, gusts, direction, temperature, humidity, pressure, and rain.
      lastHourTitle: Last hour
      lastHourDescription: Trend values and a compact wind-direction history for the last hour.
      windHistoryTitle: Wind history
      windHistoryDescription: Wind speed, gusts, and direction over time.
      airHistoryTitle: Air history
      airHistoryDescription: Temperature, humidity, and rain over time.
  colors:
    title: Map marker colours
    description: The same colour scale marks wind speed and gusts on map markers, the last-hour rose, and history charts.
  freshness:
    title: Data freshness colours
    description: The "updated" time fades from gold to grey as a reading ages — a quick way to spot stale data.
  providers:
    title: Data providers
    description: Station data comes from multiple provider networks. Provider names link back to the source when available.
  compatibility:
    title: Compatibility
    description: Works best in a recent desktop or mobile browser.
  privacy:
    title: Privacy
    description: Location is only used when you ask, for the nearby view and distances. Favourites are saved in your browser only — no account or cross-device sync.
  faq:
    title: FAQ about v2 of the web app
    items:
      whyQuestion: Why refresh something that already worked?
      whyAnswer: >-
        "Still works" isn't the same as "will keep working." The app was built on tools
        that, years on, had quietly become the software equivalent of a wing well past
        what its manual recommends — it still flew, but fewer people in the world still
        knew how to check it properly, and every change felt like a bit of a leap of
        faith. For a tool pilots use to judge whether it's safe to launch, that's not a
        feeling we wanted to keep.
      feelQuestion: Will it feel different?
      feelAnswer: >-
        A few corners got tidied up along the way, the same way you might swap a worn
        strap while you're already re-lining a wing. But the map, the stations, and the
        wind readings you already know how to read are all still there. Most of what
        changed, you won't see directly — it's now much safer for us to keep improving
        things, and you can already feel that in how often small updates have been
        landing since.
      costQuestion: Wasn't there something about the map costing money?
      costAnswer: >-
        For years, yes. The map ran on Mapbox, a paid service that bills by usage — so the
        more pilots opened the app, the bigger the bill. Every year, keeping winds.mobi's
        map switched on meant asking Mapbox for a discount just to afford it. A strange
        position for a free safety tool to be in.
      fixQuestion: So what changed?
      fixAnswer: >-
        We moved the map to tiles run by the Swiss OpenStreetMap Association — a
        community of volunteers who keep it open to anyone, free of charge, the same
        spirit winds.mobi itself runs on.
      futureQuestion: Will winds.mobi keep costing nothing to run?
      futureAnswer: >-
        That's the point of doing this now. The map used to be the single biggest running
        cost — now it isn't one at all, which makes it a lot easier to keep winds.mobi
        free for as long as pilots need it.
  about:
    title: About
    description: Questions, issues, or improvement ideas are welcome.
    teamTitle: Built by
    teamValue: Michal, Fred Montet, Yann Savary
    communityTitle: Community
    communityDescription: >-
      Questions, bug reports, and feature requests — join our Discord.
      Scan the code or follow the link.
    repoTitle: Repository
    repoValue: github.com/winds-mobi/winds-mobi-client-web
    repoDescription: For developers — browse the source or open an issue.
  changelog:
    title: Changelog
    description: Recent shipped changes, straight from the project changelog.
    loading: Loading changelog…
    error: The changelog could not be loaded right now.

