services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    # env_file:
    # - ./ui/.env
    # No host port publish: OrbStack routes https://ui.winds-mobi-client-web.orb.local
    # to the container's port 4200 via the labels below, so several projects can run
    # side by side without competing for the host's single :4200.
    expose:
      - 4200
    volumes:
      - .:/app
      - /app/node_modules
    labels:
      - dev.orbstack.domains=ui.winds-mobi-client-web.orb.local
      - dev.orbstack.http-port=4200
