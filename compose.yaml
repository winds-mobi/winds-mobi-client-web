services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    # Without a real init process as PID 1, orphaned/crashed child processes
    # (notably headless Chromium's GPU/crashpad sub-processes spawned during
    # `pnpm test:ember*`) never get reaped and accumulate as zombies for the
    # life of the container. `init: true` has Docker run its own tini ahead
    # of the entrypoint to reap them.
    init: true
    # env_file:
    # - ./ui/.env
    # No host port publish: OrbStack routes https://ui.winds-mobi-client-web.orb.local
    # to the container's port 4200 via the labels below, so several projects can run
    # side by side without competing for the host's single :4200.
    expose:
      - 4200
    environment:
      # The container is served over OrbStack's HTTPS domain, so Vite's HMR client
      # must use wss (not ws) to avoid the page blocking insecure WebSocket content.
      # `hmrClientConfig()` in vite.config.mjs derives the protocol/port from this.
      - APP_URL=https://ui.winds-mobi-client-web.orb.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.vscode
    labels:
      - dev.orbstack.domains=ui.winds-mobi-client-web.orb.local
      - dev.orbstack.http-port=4200
